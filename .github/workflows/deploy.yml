name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Убедись, что твоя ветка называется именно main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        # ЗАМЕНИ "job-tt" на точное имя твоего репозитория на GitHub
        run: flutter build web --release --base-href "/job-tt/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web